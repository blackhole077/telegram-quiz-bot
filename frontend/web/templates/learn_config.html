<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn</title>
    <script src="https://unpkg.com/htmx.org@2.0.0"
        integrity="sha384-wS5l5IKJBvK6sPTKa2WZ1js3d947pvWXbPJ1OmWfEuxLgeHcEbjUUA5i9V5ZkpCw"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <script>
        function _renderMath(root) {
            renderMathInElement(root, {
                delimiters: [
                    { left: "\\[", right: "\\]", display: true },
                    { left: "\\(", right: "\\)", display: false }
                ],
                throwOnError: false
            });
        }
        document.addEventListener("DOMContentLoaded", () => _renderMath(document.body));
        document.addEventListener("htmx:afterSwap", (evt) => _renderMath(evt.detail.elt));
    </script>
    <script>
        function updateLearnForm() {
            const exerciseType = document.getElementById("exercise-type").value;
            document.getElementById("field-concept-a-label").textContent =
                exerciseType === "connect" ? "Concept A" : "Concept";
            document.getElementById("field-concept-b").style.display =
                exerciseType === "connect" ? "" : "none";
            document.getElementById("field-domain-b").style.display =
                exerciseType === "debug" ? "" : "none";
            document.getElementById("field-audience").style.display =
                exerciseType === "teach" ? "" : "none";
            if (exerciseType === "connect") {
                htmx.trigger(document.getElementById("concept-a-select"), "change");
            }
        }
        document.addEventListener("DOMContentLoaded", updateLearnForm);
    </script>
</head>

<body>
    <div class="page">
        <header class="header">
            <h1>Learn</h1>
        </header>
        <nav class="mode-nav">
            <a href="/" class="nav-link">Review</a>
            <a href="/practice" class="nav-link">Practice</a>
            <a href="/exam" class="nav-link">Exam</a>
            <a href="/learn" class="nav-link active">Learn</a>
        </nav>
        <main>
            <div id="learn-area">
                <form hx-post="/learn/start" hx-target="#learn-area" hx-swap="innerHTML" hx-indicator="#learn-loading">
                    <div class="config-form">
                        <div class="config-field">
                            <label for="exercise-type">Exercise</label>
                            <select id="exercise-type" name="exercise_type" onchange="updateLearnForm()">
                                <option value="connect">Connection Surface - explain a relationship</option>
                                <option value="debug">Concept Debug - find the error</option>
                                <option value="derive">Scaffolded Derivation - fill in blanks</option>
                                <option value="teach">Teach-It-Back - explain a concept</option>
                            </select>
                        </div>

                        <div class="config-field" id="field-concept-a">
                            <label id="field-concept-a-label" for="concept-a-select">Concept</label>
                            <select id="concept-a-select" name="concept_a" hx-get="/learn/neighbors"
                                hx-target="#concept-b-select" hx-swap="innerHTML" hx-trigger="change">
                                {% for node_name in node_names %}
                                <option value="{{ node_name }}">{{ node_name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="config-field" id="field-concept-b">
                            <label for="concept-b-select">Concept B</label>
                            <select id="concept-b-select" name="concept_b">
                                <option value="">Loading neighbors...</option>
                            </select>
                        </div>

                        <div class="config-field" id="field-domain-b">
                            <label for="domain-b">Target Domain</label>
                            <input id="domain-b" type="text" name="domain_b"
                                placeholder="e.g. thermodynamics, economics, biology">
                        </div>

                        <div class="config-field" id="field-audience">
                            <label for="audience">Audience</label>
                            <input id="audience" type="text" name="audience" value="a fellow student">
                        </div>

                        <button type="submit" class="start-btn">Start Exercise</button>
                    </div>
                </form>
                <div id="learn-loading" class="htmx-indicator loading-indicator">
                    Generating exercise...
                </div>
            </div>
        </main>
    </div>
</body>

</html>
